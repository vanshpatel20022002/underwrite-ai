apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: underwriting
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: underwriting-api:latest
          imagePullPolicy: Never
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: underwriting-config
            - secretRef:
                name: underwriting-secrets
