apiVersion: v1
kind: ConfigMap
metadata:
  name: underwriting-config
  namespace: underwriting
data:
  # Postgres
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "underwriting"
  POSTGRES_DB: "underwriting"

  # Qdrant
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"

  # Redis / Celery
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"

  # App
  CONFIDENCE_THRESHOLD: "0.65"
  UPLOAD_DIR: "/app/uploads"
  DATA_DIR: "/app/data"

  # LLM — defaults to Groq; override via secret for a different provider
  LLM_PROVIDER: "groq"
  GROQ_MODEL: "llama-3.3-70b-versatile"

  # Frontend — points to the API port-forwarded address for local clusters
  NEXT_PUBLIC_API_URL: "http://localhost:8000"
