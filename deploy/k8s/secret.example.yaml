# secret.example.yaml — PLACEHOLDER ONLY.
# Do NOT commit real keys. Copy this file, fill in real values,
# and apply it with: kubectl apply -f secret.yaml -n underwriting
#
# To generate from your .env file instead, see the README.
apiVersion: v1
kind: Secret
metadata:
  name: underwriting-secrets
  namespace: underwriting
type: Opaque
stringData:
  # Database
  POSTGRES_PASSWORD: "change-me"

  # LLM — set the key for whichever provider you selected in configmap.yaml
  GROQ_API_KEY: "your-groq-api-key-here"
  OPENAI_API_KEY: ""

  # Optional: Vertex AI service-account JSON (base64-encode the file and use
  # a volume mount instead; this field is a convenience placeholder only)
  GOOGLE_APPLICATION_CREDENTIALS: ""
  VERTEX_PROJECT_ID: ""
  VERTEX_LOCATION: "us-central1"
