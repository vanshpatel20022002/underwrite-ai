apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: underwriting
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: underwriting-api:latest
          # imagePullPolicy: Never loads the image from the local daemon
          # (used by kind/minikube — remove for a remote registry)
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: underwriting-config
            - secretRef:
                name: underwriting-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: underwriting
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
